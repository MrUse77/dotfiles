# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hyprland.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#autogenerated = 1 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=DP-2,preferred,auto,1
monitor=HDMI-A-1,preferred,auto,1

workspace = 1, monitor:DP-2
workspace = 2, monitor:DP-2
workspace = 3, monitor:DP-2
workspace = 4, monitor:DP-2
workspace = 5, monitor:DP-2
workspace = 6, monitor:HDMI-A-1
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 6, monitor:HDMI-A-1
workspace = 0, monitor:HDMI-A-1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$fileManager = thunar
$menu = nwg-drawer -c 6 -is 64 -ovl


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent & waybar & hyprctl setcursor volantes_cursors 24 & dunst & hyprsunset
exec-once = hyprpm reload -n & hyprpaper & corectrl


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,volantes_cursors
# --- TOOLKITS BACKENDS ---
# Forzar a GTK a usar Wayland, fallback a X11 si falla
env = GDK_BACKEND,wayland,x11,*
# Forzar a Qt a usar Wayland
env = QT_QPA_PLATFORM,wayland;xcb
# Forzar SDL (Juegos) a usar Wayland
env = SDL_VIDEODRIVER,wayland
# Forzar Clutter a usar Wayland
env = CLUTTER_BACKEND,wayland

# --- QT SPECIFICS ---
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = PATH,$PATH:$HOME/.nix-profile/bin
# --- ELECTRON / CHROMIUM ---
# Crítico para que VS Code, Discord, Chrome usen Wayland nativo
env = ELECTRON_OZONE_PLATFORM_HINT,auto

###################
### PERMISSIONS ###
###################

# See https://wiki.hyprland.org/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
	gaps_in = 10
	gaps_out = 20

		border_size = 5
		

# https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
		col.active_border =rgba(262738aa)
		col.inactive_border = rgba(595959aa)
# Set to true enable resizing windows by clicking and dragging on borders and gaps
		resize_on_border = true
		extend_border_grab_area	= 0

# Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
		allow_tearing = true

		layout = dwindle
}



# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
	rounding = 15
	rounding_power = 10

# Change transparency of focused and unfocused windows
		active_opacity = 0.9
		inactive_opacity = 0.5

		shadow {
			enabled = true
				range = 5
				render_power = 2
				color = rgba(122, 162, 247, 1)
				offset = 0, -1
		}

# https://wiki.hyprland.org/Configuring/Variables/#blur
	blur {
		enabled = true
			size = 4
			passes = 4
			new_optimizations = true
			vibrancy = 0.1696
	}
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
	enabled = yes

# Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

		bezier = easeOutQuint,0.23,1,0.32,1
		bezier = easeInOutCubic,0.65,0.05,0.36,1
		bezier = linear,0,0,1,1
		bezier = almostLinear,0.5,0.5,0.75,1.0
		bezier = quick,0.15,0,0.1,1

		animation = global, 1, 10, default
		animation = border, 1, 5.39, easeOutQuint
		animation = windows, 1, 4.79, easeOutQuint
		animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
		animation = windowsOut, 1, 1.49, linear, popin 87%
		animation = fadeIn, 1, 1.73, almostLinear
		animation = fadeOut, 1, 1.46, almostLinear
		animation = fade, 1, 3.03, quick
		animation = layers, 1, 3.81, easeOutQuint
		animation = layersIn, 1, 4, easeOutQuint, fade
		animation = layersOut, 1, 1.5, linear, fade
		animation = fadeLayersIn, 1, 1.79, almostLinear
		animation = fadeLayersOut, 1, 1.39, almostLinear
		animation = workspaces, 1, 1.94, almostLinear, fade
		animation = workspacesIn, 1, 1.21, almostLinear, fade
		animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
	pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
		preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
	new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
	force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
		disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(


}
render {
    direct_scanout = false
}

#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
kb_layout = us,latam
kb_variant =
kb_model =
kb_options =
kb_rules =

follow_mouse = 1

sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

accel_profile=flat
touchpad {
	natural_scroll = false
}
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
     bind = $mainMod, L, exit,
     bind = $mainMod, E, exec, $fileManager
     bind = $mainMod, V, togglefloating,
     bind = $mainMod, M, exec, $menu
     bind = $mainMod, P, pseudo, # dwindle
     bind = $mainMod, J, togglesplit, # dwindle
     bind = $mainMod, F, fullscreen
     bind = $mainMod,T,togglesplit
     bind = $mainMod,Space,exec, hyprctl switchxkblayout current next # Toggle floating mode for the active window
     bind = , PRINT, exec, hyprshot -m region
     bind = $SUPER_SHIFT, L, exec, hyprlock
     bind = $mainMod, Y, exec,ghostty --config-file=$HOME/.config/ghostty/config-clean -e yazi 
     bind = $SUPER_SHIFT, Y, exec,ghostty --config-file=$HOME/.config/ghostty/config-clean -e sudo yazi 

# Move focus with mainMod + arrow keys
     bind = $mainMod, left, movefocus, l
     bind = $mainMod, right, movefocus, r
     bind = $mainMod, up, movefocus, u
     bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
     bind = $mainMod, 1, workspace, 1
     bind = $mainMod, 2, workspace, 2
     bind = $mainMod, 3, workspace, 3
     bind = $mainMod, 4, workspace, 4
     bind = $mainMod, 5, workspace, 5
     bind = $mainMod, 6, workspace, 6
     bind = $mainMod, 7, workspace, 7
     bind = $mainMod, 8, workspace, 8
     bind = $mainMod, 9, workspace, 9
     bind = $mainMod, 0, workspace, 10
     bind = $mainMod, l, workspace, e+1
     bind = $mainMod, h, workspace, e-1
     bind = $mainMod, j, workspace, e-5
     bind = $mainMod, k, workspace, e+5


# Move active window to a workspace with mainMod + SHIFT + [0-9]
     bind = $mainMod SHIFT, 1, movetoworkspace, 1
     bind = $mainMod SHIFT, 2, movetoworkspace, 2
     bind = $mainMod SHIFT, 3, movetoworkspace, 3
     bind = $mainMod SHIFT, 4, movetoworkspace, 4
     bind = $mainMod SHIFT, 5, movetoworkspace, 5
     bind = $mainMod SHIFT, 6, movetoworkspace, 6
     bind = $mainMod SHIFT, 7, movetoworkspace, 7
     bind = $mainMod SHIFT, 8, movetoworkspace, 8
     bind = $mainMod SHIFT, 9, movetoworkspace, 9
     bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
     bind = $mainMod, S, togglespecialworkspace, magic
     bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
     bind = $mainMod, mouse_down, workspace, e+1
     bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
     bindm = $mainMod, mouse:272, movewindow
     bindm = $mainMod, mouse:273, resizewindow
# Modo Estudio (Todo normal)
     bind = $mainMod, F1, exec, hyprctl keyword monitor "DP-2, 1920x1080@60, auto, 1" && hyprctl keyword monitor "HDMI-A-1, 1920x1080@60, auto, 1"

# Modo CS2 (Principal estirado, Secundario se mantiene a la derecha)
     bind = $mainMod, F2, exec, hyprctl keyword monitor "DP-2, 1440/home/agustin/Descargas/Eclipse-Shader-Unstable.zipx1080@60, auto, 1" && hyprctl keyword monitor "HDMI-A-1, 1920x1080@60, auto, 1"


# Laptop multimedia keys for volume and LCD brightness
     bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
     bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
     bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
     bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
     bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
     bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
     bindl = , XF86AudioNext, exec, playerctl next
     bindl = , XF86AudioPause, exec, playerctl play-pause
     bindl = , XF86AudioPlay, exec, playerctl play-pause
     bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$
windowrule {
	     name = brave
	     opacity = 1 override 0.9 override 
             match:class = brave-browser

} 
windowrule {
	     name = YT Music
	     opacity = 1 override 0.9 override 
             match:class = com.github.th_ch.youtube_music

} 
# Ignore maximize requests from apps. You'll probably like this.
#windowrule = suppressevent fullscreen, class:.*
#windowrule = suppressevent minimize, class:.*
#windowrule = suppressevent activate, class:.*
windowrule = match:title Confirmacion|Abrir Achivo,float true
windowrule = match:class mpv, fullscreen true
# Fix some dragging issues with XWayland
#windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
plugin {
	path = ~/.config/hypr/hyprpm/plugins

		split-monitor-workspaces {
			count = 5
				keep_focused = 1
				enable_notifications = 0
				enable_persistent_workspaces = 1
		}

	csgo-vulkan-fix {
# Whether to fix the mouse position. A select few apps might be wonky with this.
		fix_mouse = true

# Add apps with vkfix-app = initialClass, width, height
			vkfix-app = cs2, 1584, 1080 # 4:3
			vkfix-app = steam_app_2427520, 1920, 1080
	}


	hyprbars {
# Configuration options go here
		enabled = true
			bar_height = 20
			bar_color = rgb(26,27, 38)
			bar_blur = yes
			bar_title_enabled = true
			hyprbars-button = rgb(ff4040), 10, 󰖭, hyprctl dispatch killactive
			hyprbars-button = rgb(eeee11), 10,  , hyprctl dispatch fullscreen 1
			bar_part_of_window =true
	}
}
windowrule {
	name = updating
		float = on
		center = on
		size = 800 500
		match:title = UPDATING_SYSTEM
}
# Reglas para arreglar el parpadeo de Yazi/Ueberzugpp
# Ueberzug crea ventanas con nombres de clase específicos o a veces nulos/extraños.
# Intentaremos capturarlas todas.

#windowrule = match:class cs2, inmediate true
windowrule = match:class cs2, fullscreen true

xwayland {
	force_zero_scaling = true
}
windowrule=match:class discord, allows_input on, focus_on_activate on
windowrule=match:class org.pulseaudio.pavucontrol, float on
windowrule=match:class ^(ueberzugpp_)(.*)$, float on
windowrul=match:class com.github.th_ch.youtube_music opacity 1 override 0.9 override  
