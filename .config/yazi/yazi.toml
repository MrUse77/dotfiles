[mgr]
ratio          = [1, 3, 5]
sort_by        = "alphabetical"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false
linemode       = "size"
show_hidden    = true
show_symlink   = true
scrolloff      = 5
mouse_events   = ["click", "scroll"]
title_format   = "yazi: {cwd}"


[preview]
wrap            = "no"
tab_size        = 2
max_width       = 600
max_height      = 900
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 75
ueberzug_scale  = 1
ueberzug_offset = [0, 0, 0, 0]


[opener]
edit = [
	{ run = '${EDITOR:-nvim} %s', desc = "$EDITOR", block = true, for = "unix" },
]
open = [
	{ run = 'xdg-open %s1', desc = "Open", for = "linux" },
]
reveal = [
	{ run = 'xdg-open %d1', desc = "Reveal", for = "linux" },
]
extract = [
	{ run = 'ya pub extract --list %s', desc = "Extract here" },
]
play = [
	{ run = 'mpv --force-window %s1', orphan = true, for = "unix" },
	{ run = 'xdg-open %s1',           orphan = true, for = "linux" },
]


[open]
rules = [
	# Folder
	{ url = "*/", use = ["edit", "open", "reveal"] },
	# Text
	{ mime = "text/*", use = ["edit", "reveal"] },
	# Image
	{ mime = "image/*", use = ["open", "reveal"] },
	# Media
	{ mime = "{audio,video}/*", use = ["play", "reveal"] },
	# Code
	{ mime = "application/{json,ndjson,javascript,wine-extension-ini}", use = ["edit", "reveal"] },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*}", use = ["extract", "reveal"] },
	# Fallback
	{ url = "*", use = ["open", "reveal"] },
]


[tasks]
file_workers     = 3
plugin_workers   = 5
fetch_workers    = 5
preload_workers  = 2
process_workers  = 5
bizarre_retry    = 3
image_alloc      = 536870912  # 512MB
image_bound      = [10000, 10000]
suppress_preload = false


[plugin]
fetchers = [
	{ id = "mime", url = "*/",        run = "mime.dir",   prio = "high" },
	{ id = "mime", url = "local://*", run = "mime.local", prio = "high" },
]
spotters = [
	{ url = "*/",                        run = "folder" },
	{ mime = "text/*",                   run = "code"   },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	{ mime = "image/svg+xml",            run = "svg"    },
	{ mime = "image/*",                  run = "image"  },
	{ mime = "video/*",                  run = "video"  },
	{ url = "*",                         run = "file"   },
]
preloaders = [
	{ mime = "image/svg+xml",            run = "svg"   },
	{ mime = "image/*",                  run = "image" },
	{ mime = "video/*",                  run = "video" },
	{ mime = "application/pdf",          run = "pdf"   },
	{ mime = "font/*",                   run = "font"  },
	{ mime = "application/ms-opentype",  run = "font"  },
]
previewers = [
	{ url = "*/",                        run = "folder" },
	{ mime = "text/*",                   run = "code"   },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	{ mime = "application/{json,ndjson}", run = "json"  },
	{ mime = "image/svg+xml",            run = "svg"    },
	{ mime = "image/*",                  run = "image"  },
	{ mime = "video/*",                  run = "video"  },
	{ mime = "application/pdf",          run = "pdf"    },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*}", run = "archive" },
	{ mime = "font/*",                   run = "font"   },
	{ mime = "application/ms-opentype",  run = "font"   },
	{ url = "*",                         run = "file"   },
]


[input]
cursor_blink = false

# cd
cd_title  = "  Change directory"
cd_origin = "top-center"
cd_offset = [0, 2, 50, 3]

# create
create_title  = ["  Create file", "  Create directory"]
create_origin = "top-center"
create_offset = [0, 2, 50, 3]

# rename
rename_title  = "  Rename"
rename_origin = "hovered"
rename_offset = [0, 1, 50, 3]

# filter
filter_title  = "  Filter"
filter_origin = "top-center"
filter_offset = [0, 2, 50, 3]

# find
find_title  = ["  Find next", "  Find previous"]
find_origin = "top-center"
find_offset = [0, 2, 50, 3]

# search
search_title  = "  Search via"
search_origin = "top-center"
search_offset = [0, 2, 50, 3]

# shell
shell_title  = ["  Shell", "  Shell (block)"]
shell_origin = "top-center"
shell_offset = [0, 2, 50, 3]


[confirm]
trash_title  = "  Trash {n} selected file{s}?"
trash_origin = "center"
trash_offset = [0, 0, 70, 20]

delete_title  = "  Permanently delete {n} file{s}?"
delete_origin = "center"
delete_offset = [0, 0, 70, 20]

overwrite_title  = "  Overwrite file?"
overwrite_origin = "center"
overwrite_offset = [0, 0, 70, 20]

quit_title  = "  Quit?"
quit_origin = "center"
quit_offset = [0, 0, 70, 20]


[pick]
open_title  = "  Open with"
open_origin = "hovered"
open_offset = [0, 1, 50, 7]


[which]
sort_by        = "none"
sort_sensitive = false
sort_reverse   = false
sort_translit  = false
